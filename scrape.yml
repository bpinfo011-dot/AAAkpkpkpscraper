name: KP Scraper

on:
  workflow_dispatch:          # Manual trigger (the "Run workflow" button)
  repository_dispatch:        # Auto-trigger for continuation
    types: [continue-scrape]

# Only one scraper run at a time
concurrency:
  group: kp-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # 5h 50min hard limit

    permissions:
      contents: write         # to push checkpoint back to repo

    steps:
      # ── 1. Checkout code (includes any previous checkpoint.json) ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Install dependencies ──
      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      # ── 4. Run the scraper ──
      - name: Run scraper
        id: scrape
        run: |
          set +e
          python scraper.py
          CODE=$?
          echo "exit_code=$CODE" >> "$GITHUB_OUTPUT"
          if [ "$CODE" -eq 0 ]; then
            echo "status=done" >> "$GITHUB_OUTPUT"
          elif [ "$CODE" -eq 2 ]; then
            echo "status=continue" >> "$GITHUB_OUTPUT"
          else
            echo "status=error" >> "$GITHUB_OUTPUT"
          fi
          # Don't fail the step so we can save the checkpoint
          exit 0

      # ── 5. Commit checkpoint + leads back to the repo ──
      - name: Save progress to repository
        if: always()
        run: |
          git config user.name "Scraper Bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f checkpoint.json leads.csv 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "scraper checkpoint $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main || true
            git push
          fi

      # ── 6. Upload leads.csv as downloadable artifact ──
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kp-leads
          path: leads.csv
          overwrite: true

      # ── 7. Auto-trigger next run if not finished ──
      - name: Trigger continuation
        if: steps.scrape.outputs.status == 'continue'
        env:
          GH_TOKEN: ${{ secrets.KP_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "⚠ No KP_PAT secret set — please re-run the workflow manually."
            echo "  Go to: Actions → KP Scraper → Run workflow"
            exit 0
          fi
          echo "Triggering next run..."
          gh api "repos/${{ github.repository }}/dispatches" \
            -f event_type=continue-scrape
          echo "✓ Next run triggered"

      # ── 8. Final status ──
      - name: Report status
        if: always()
        run: |
          STATUS="${{ steps.scrape.outputs.status }}"
          if [ "$STATUS" = "done" ]; then
            echo "🎉 Scraper finished! Download leads.csv from the Artifacts section above."
          elif [ "$STATUS" = "continue" ]; then
            echo "⏸ Scraper paused (time limit). Next run will continue automatically."
          else
            echo "❌ Scraper encountered an error. Check the logs above."
            exit 1
          fi
